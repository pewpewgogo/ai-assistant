name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Build executable with PyInstaller
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Assistant-Windows
          path: "dist/AI Assistant.exe"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/AI Assistant.exe"
          generate_release_notes: true
          body: |
            ## ЧПУ Помощник / CNC Assistant v0.2.0

            **Голосовой помощник для работы с ЧПУ-фрезером Two Trees TTC450 Pro**

            ### Что нового в v0.2.0
            - 🎤 Большая кнопка «Говорить» — простой интерфейс для удобной работы
            - 🎯 Подсветка на экране — помощник показывает стрелками куда нажимать
            - 📖 База знаний TTC450 Pro и Candle — отвечает на вопросы о станке
            - ⌨️ Горячая клавиша F1 — начать разговор из любого приложения
            - 🤖 Режимы «Подсказка» и «Выполнение» — показывает или делает за вас

            ### Установка
            1. Скачайте `AI.Assistant.exe` ниже
            2. Запустите двойным кликом
            3. Откройте Настройки → вставьте API ключ OpenAI или Anthropic
            4. Нажмите большую кнопку 🎤 или клавишу F1 и говорите

            Requires an OpenAI or Anthropic API key.
